<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ripple-origin {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 0;
    height: 0;
    border-radius: 50%;
    background: #5ba4f5;
    z-index: 0;
    animation: rippleExpand 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes rippleExpand {
    0%   { width: 0; height: 0; opacity: 1; }
    60%  { width: 300vmax; height: 300vmax; opacity: 1; }
    100% { width: 300vmax; height: 300vmax; opacity: 0; }
  }

  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    animation: fadeIn 0.5s ease 0.6s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .search-wrapper {
    position: relative;
    width: 580px;
    transform: scaleX(0.2);
    transform-origin: center;
    animation: stretchIn 0.7s cubic-bezier(0.34, 1.3, 0.64, 1) 0.55s forwards;
  }

  @keyframes stretchIn {
    to { transform: scaleX(1); }
  }

  .search-box {
    display: flex;
    align-items: center;
    width: 100%;
    height: 52px;
    border: 2px solid #5ba4f5;
    border-radius: 26px;
    padding: 0 16px 0 22px;
    background: #fff;
    transition: box-shadow 0.25s ease, border-color 0.25s ease;
    overflow: hidden;
  }

  .search-box:hover {
    box-shadow: 0 4px 20px rgba(91, 164, 245, 0.22);
  }

  .search-box:focus-within {
    box-shadow: 0 4px 24px rgba(91, 164, 245, 0.3);
  }

  .search-input {
    flex: 1;
    border: none;
    outline: none;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #222;
    background: transparent;
    letter-spacing: -0.3px;
    caret-color: #5ba4f5;
  }

  .search-input::placeholder {
    color: #aaa;
    font-weight: 300;
  }

  .search-right {
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .icon-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #999;
    transition: background 0.2s ease, color 0.2s ease, transform 0.15s ease;
  }

  .icon-btn:hover {
    background: #eef5fe;
    color: #5ba4f5;
    transform: scale(1.08);
  }

  .divider {
    width: 1px;
    height: 20px;
    background: #ddd;
    margin: 0 4px;
  }

  .search-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: transparent;
    cursor: pointer;
    color: #5ba4f5;
    transition: background 0.2s ease, transform 0.15s ease;
  }

  .search-btn:hover {
    background: #eef5fe;
    transform: scale(1.1) rotate(8deg);
  }

  .search-btn:active {
    transform: scale(0.95);
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(91,164,245,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,164,245,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="ripple-origin"></div>

<div class="container">
  <div class="search-wrapper">
    <div class="search-box">
      <input class="search-input" id="searchInput" type="text" placeholder="유승연을 입력하세요" autocomplete="off" onkeydown="handleKey(event)" />
      <div class="search-right">
        <button class="icon-btn" title="keyboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="6" width="20" height="12" rx="2"/>
            <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8M6 14h.01M18 14h.01"/>
          </svg>
        </button>
        <button class="icon-btn" title="mic">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <div class="divider"></div>
        <button class="search-btn" title="search" onclick="doSearch()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  const PORTFOLIO_URL = 'https://winningyear.github.io/deltag/portfolio.html';

  const NAME_KEYWORDS = [
    '유승연', '승연', 'seongyeon', 'yu seongyeon', 'seongyeon yu',
    'seonyeon', 'yu seonyeon', 'yoo seungyeon', 'seungyeon',
    'yu', 'yoo', '유'
  ];

  function isNameQuery(query) {
    const q = query.trim().toLowerCase().replace(/\s+/g, ' ');
    return NAME_KEYWORDS.some(kw => q.includes(kw));
  }

  function doSearch() {
    const query = document.getElementById('searchInput').value;
    if (!query.trim()) return;
    if (isNameQuery(query)) {
      window.location.href = PORTFOLIO_URL;
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter') doSearch();
  }
</script>

</body>
</html>
