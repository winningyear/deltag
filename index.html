<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ripple-origin {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 0; height: 0;
    border-radius: 50%;
    background: #5ba4f5;
    z-index: 0;
    animation: rippleExpand 1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes rippleExpand {
    0%   { width: 0; height: 0; opacity: 1; }
    60%  { width: 300vmax; height: 300vmax; opacity: 1; }
    100% { width: 300vmax; height: 300vmax; opacity: 0; }
  }

  /* 전체를 하나의 컨테이너로 */
  .search-container {
    position: relative;
    z-index: 10;
    width: min(580px, calc(100vw - 48px));
    border: 2px solid #5ba4f5;
    border-radius: 26px;
    background: #fff;
    overflow: hidden;
    opacity: 0;
    transform: scaleX(0.2);
    animation: fadeIn 0.5s ease 0.6s forwards,
               stretchIn 0.7s cubic-bezier(0.34, 1.3, 0.64, 1) 0.55s forwards;
    transition: box-shadow 0.25s ease, border-radius 0.2s ease;
  }

  .search-container.open {
    border-radius: 20px;
    box-shadow: 0 8px 32px rgba(91,164,245,0.18);
  }

  .search-container:not(.open):hover {
    box-shadow: 0 4px 20px rgba(91,164,245,0.22);
  }

  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes stretchIn { to { transform: scaleX(1); } }

  /* 검색창 행 */
  .search-row {
    display: flex;
    align-items: center;
    height: 52px;
    padding: 0 16px 0 22px;
  }

  .search-input {
    flex: 1; border: none; outline: none;
    font-size: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #222; background: transparent;
    letter-spacing: -0.3px;
    caret-color: #5ba4f5;
    min-width: 0;
  }
  .search-input::placeholder { color: #aaa; font-weight: 300; }

  .search-right { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }

  .icon-btn {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border-radius: 50%; border: none;
    background: transparent; cursor: pointer; color: #999;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }
  .icon-btn:hover { background: #eef5fe; color: #5ba4f5; transform: scale(1.08); }

  .divider { width: 1px; height: 20px; background: #ddd; margin: 0 4px; }

  .search-btn {
    display: flex; align-items: center; justify-content: center;
    width: 36px; height: 36px;
    border-radius: 50%; border: none;
    background: transparent; cursor: pointer; color: #5ba4f5;
    transition: background 0.2s, transform 0.15s;
  }
  .search-btn:hover { background: #eef5fe; transform: scale(1.1) rotate(8deg); }
  .search-btn:active { transform: scale(0.95); }

  /* 구분선 */
  .search-divider {
    height: 0;
    border: none;
    border-top: 1px solid #ddeeff;
    margin: 0;
    display: none;
  }
  .search-container.open .search-divider { display: block; }

  /* 드롭다운 — 컨테이너 안에 있어서 border 공유 */
  .dropdown {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .search-container.open .dropdown { max-height: 300px; }

  .dropdown-section { padding: 8px 0 10px; }

  .dropdown-label {
    font-size: 10px; letter-spacing: 1.5px;
    text-transform: uppercase; color: #b0c8f0;
    padding: 0 20px 6px;
  }

  .dropdown-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 20px; cursor: pointer;
    transition: background 0.15s;
  }
  .dropdown-item:hover { background: #eef5fe; }

  .dropdown-icon {
    width: 28px; height: 28px; border-radius: 8px;
    background: #eef5fe;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: #5ba4f5;
  }

  .dropdown-item-text { flex: 1; min-width: 0; }
  .dropdown-item-main { font-size: 14px; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dropdown-item-sub { font-size: 11px; color: #999; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .dropdown-item-tag {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    background: #eef5fe; color: #5ba4f5;
    border: 1px solid #b8d8fb; flex-shrink: 0;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(91,164,245,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(91,164,245,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 1;
  }
</style>
</head>
<body>

<div class="ripple-origin"></div>

<div class="search-container" id="searchContainer">
  <!-- 검색창 행 -->
  <div class="search-row">
    <input class="search-input" id="searchInput" type="text"
      placeholder="유승연을 입력하세요" autocomplete="off"
      oninput="handleInput()"
      onkeydown="handleKey(event)"
      onfocus="handleInput()" />
    <div class="search-right">
      <button class="icon-btn" title="keyboard">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="6" width="20" height="12" rx="2"/>
          <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01M8 14h8M6 14h.01M18 14h.01"/>
        </svg>
      </button>
      <button class="icon-btn" title="mic">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <div class="divider"></div>
      <button class="search-btn" onclick="doSearch()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 구분선 -->
  <hr class="search-divider" />

  <!-- 드롭다운 -->
  <div class="dropdown">
    <div class="dropdown-section">
      <div class="dropdown-label">연관 검색</div>

      <div class="dropdown-item" onclick="goPortfolio()">
        <div class="dropdown-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3"/></svg>
        </div>
        <div class="dropdown-item-text">
          <div class="dropdown-item-main">MD Simulation</div>
          <div class="dropdown-item-sub">GROMACS · AMBER · SLURM HPC</div>
        </div>
        <span class="dropdown-item-tag">MD</span>
      </div>

      <div class="dropdown-item" onclick="goPortfolio()">
        <div class="dropdown-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="dropdown-item-text">
          <div class="dropdown-item-main">QSAR · ADMET Prediction</div>
          <div class="dropdown-item-sub">RDKit · Mordred · XGBoost · PyTorch</div>
        </div>
        <span class="dropdown-item-tag">ML</span>
      </div>

      <div class="dropdown-item" onclick="goPortfolio()">
        <div class="dropdown-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </div>
        <div class="dropdown-item-text">
          <div class="dropdown-item-main">Molecular Docking</div>
          <div class="dropdown-item-sub">smina · GNINA · Virtual Screening</div>
        </div>
        <span class="dropdown-item-tag">Docking</span>
      </div>

    </div>
  </div>
</div>

<script>
  const PORTFOLIO_URL = 'https://winningyear.github.io/deltag/portfolio.html';
  const NAME_KEYWORDS = [
    '유승연','승연','seongyeon','yu seongyeon','seongyeon yu',
    'seonyeon','yu seonyeon','yoo seungyeon','seungyeon','yu','yoo','유'
  ];

  function isNameQuery(q) {
    return NAME_KEYWORDS.some(kw => q.trim().toLowerCase().replace(/\s+/g,' ').includes(kw));
  }

  function openDropdown() {
    document.getElementById('searchContainer').classList.add('open');
  }

  function closeDropdown() {
    document.getElementById('searchContainer').classList.remove('open');
  }

  function handleInput() {
    if (isNameQuery(document.getElementById('searchInput').value)) openDropdown();
    else closeDropdown();
  }

  function goPortfolio() { window.location.href = PORTFOLIO_URL; }

  function doSearch() {
    const val = document.getElementById('searchInput').value;
    if (val.trim() && isNameQuery(val)) goPortfolio();
  }

  function handleKey(e) {
    if (e.key === 'Enter') doSearch();
    if (e.key === 'Escape') closeDropdown();
  }

  document.addEventListener('click', e => {
    if (!document.getElementById('searchContainer').contains(e.target)) closeDropdown();
  });
</script>

</body>
</html>
